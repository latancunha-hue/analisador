<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.I.D. v9.0 [OSINT REAL-TIME]</title>
    <style>
        :root { --neon: #00ff41; --bg: #050505; --warn: #ffca00; --purple: #a020f0; --blue: #00d2ff; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; padding: 10px; font-size: 12px; }
        .container { max-width: 1000px; margin: auto; }
        .header { text-align: center; border: 1px double var(--neon); padding: 10px; margin-bottom: 15px; background: #001a00; }
        input { width: 92%; background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 12px; margin-bottom: 8px; border-radius: 4px; outline: none; font-size: 14px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 10px; }
        button { border: none; padding: 14px; font-weight: bold; cursor: pointer; border-radius: 4px; font-size: 9px; text-transform: uppercase; transition: 0.3s; }
        button:active { transform: scale(0.95); }
        .btn-scan { background: var(--neon); color: #000; }
        .btn-leak { background: var(--warn); color: #000; }
        .btn-osint { background: var(--purple); color: #fff; }
        .btn-track { background: var(--blue); color: #000; }
        .btn-clear { background: #333; color: #fff; }
        .section-title { font-size: 10px; color: #888; margin: 10px 0 5px 2px; text-transform: uppercase; letter-spacing: 1px; }
        .console { background: #000; border: 1px solid #1a1a1a; height: 350px; overflow: auto; padding: 10px; box-shadow: inset 0 0 15px #00ff411a; }
        pre { white-space: pre-wrap; word-break: break-all; color: #00ff41; line-height: 1.5; margin: 0; }
        .loading { color: yellow; display: none; margin-bottom: 10px; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin:0; font-size: 15px;">S.I.D. v9.0 [OSINT REAL-TIME]</h2>
        <span style="font-size: 9px; color: var(--neon);">MODO: INVESTIGAÇÃO DE CAMPO ATIVO</span>
    </div>

    <input type="text" id="targetUrl" placeholder="Link do site ou Número de Telefone" value="">
    
    <div class="section-title">Análise de Site</div>
    <div class="grid">
        <button class="btn-scan" onclick="runScan('clean')">SCAN RÁPIDO</button>
        <button class="btn-leak" onclick="huntLeaks()">DECODER VAZAMENTOS</button>
    </div>

    <div class="section-title">Módulo OSINT (Grátis 2026)</div>
    <div class="grid">
        <button class="btn-osint" onclick="window.open('https://donodozap.com', '_blank')">DONO DO ZAP</button>
        <button class="btn-osint" onclick="phoneDork()" style="background:#2ecc71;">BUSCA PROFUNDA NÚMERO</button>
        <button class="btn-osint" onclick="window.open('https://facecheck.id/', '_blank')">BUSCA POR FOTO</button>
        <button class="btn-osint" onclick="alert('DICA: Vá no Telegram e busque por: @LupaBot ou @OlhoNoOlho_Bot. Eles são os melhores para achar CPF pelo número de graça!')" style="background:#0088cc;">BOTS TELEGRAM</button>
    </div>

    <button class="btn-clear" onclick="clearDisplay()" style="width:100%; margin-top:5px;">LIMPAR CONSOLE</button>

    <div class="console">
        <div id="loader" class="loading">>>> ACESSANDO TÚNEL DE DADOS...</div>
        <pre id="output">Insira a URL do site ou o número (com DDD) para investigar.</pre>
    </div>
</div>

<script>
    const out = document.getElementById('output');
    const loader = document.getElementById('loader');

    function updateLog(msg) { out.innerText = msg; }

    function phoneDork() {
        const num = document.getElementById('targetUrl').value.replace(/\D/g, "");
        if(num.length < 10) return alert("Insira o número com DDD no campo acima!");
        const searchUrl = `https://www.google.com/search?q="${num}" OR "${num.substring(0,2)} ${num.substring(2)}"`;
        window.open(searchUrl, '_blank');
    }

    async function runScan(mode) {
        const url = document.getElementById('targetUrl').value;
        if(!url.includes('.')) return alert("Insira uma URL válida!");
        loader.style.display = "block";
        updateLog("[*] Estabelecendo túnel de anonimato...");
        try {
            const res = await fetch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`);
            const content = await res.text();
            updateLog(content.substring(0, 50000));
        } catch (e) { updateLog("[!] Falha na extração."); }
        loader.style.display = "none";
    }

    async function huntLeaks() {
        const baseUrl = document.getElementById('targetUrl').value.replace(/\/$/, "");
        loader.style.display = "block";
        updateLog("[!] Buscando arquivos críticos...");
        const targets = ["/.env", "/config.php", "/backup.sql"];
        let results = "--- DECODER DE VAZAMENTOS ---\n\n";
        for (let path of targets) {
            try {
                const res = await fetch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(baseUrl + path)}`);
                const text = await res.text();
                if (res.ok && text.length > 5) results += `[🚨] Possível arquivo: ${path}\n`;
            } catch (e) {}
        }
        updateLog(results || "Nada encontrado.");
        loader.style.display = "none";
    }

    function clearDisplay() { updateLog("Aguardando nova missão."); }
</script>
</body>
</html>
