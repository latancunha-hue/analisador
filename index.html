<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.I.D. ALPHA V10 | OSINT</title>
    <style>
        :root {
            --primary: #00ff41; /* Verde Matrix */
            --bg: #0a0a0a;
            --card: #1a1a1a;
            --text: #ffffff;
            --danger: #ff4b2b;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: var(--primary);
            font-size: 24px;
            margin: 0;
            letter-spacing: 2px;
        }

        .search-container {
            width: 100%;
            max-width: 500px;
            position: relative;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 15px;
            background: var(--card);
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
        }

        .grid-tools {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 500px;
        }

        button {
            padding: 15px;
            border: none;
            border-radius: 8px;
            background: var(--card);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 11px;
            border-bottom: 2px solid #333;
        }

        button:active { transform: scale(0.95); }

        .btn-main { background: var(--primary); color: black; }
        .btn-active { border-color: var(--primary); }

        #console {
            width: 100%;
            max-width: 500px;
            height: 200px;
            background: #000;
            margin-top: 25px;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            overflow-y: auto;
            border: 1px solid #222;
            box-sizing: border-box;
        }

        .log-info { color: var(--primary); }
        .log-error { color: var(--danger); }
        .log-hook { color: #008cff; }
    </style>
</head>
<body>

    <div class="header">
        <h1>S.I.D. ALPHA V10</h1>
        <small style="opacity: 0.5;">REAL-TIME ANALYTICS</small>
    </div>

    <div class="search-container">
        <input type="text" id="target" placeholder="ENTER TARGET URL OR DATA...">
    </div>

    <div class="grid-tools">
        <button class="btn-main" onclick="scan()">Deep Scan</button>
        <button onclick="log('Extrator de Metadados Ativo...')">Metadata Extractor</button>
        <button onclick="log('Acessando Painel Dioneel...')">Dioneel Web</button>
        <button onclick="log('Monitorando Dark Web...')">Dark Monitor</button>
        <button onclick="log('Buscando Redes Sociais...')">Socials Harvester</button>
        <button onclick="log('Consultando Operadora...')">Phone Lookup</button>
        <button onclick="log('Verificador de CPF/CNPJ...')">Verifier</button>
        <button onclick="log('Rastreando IP...')">IP Trace</button>
        <button onclick="log('Obtendo Coordenadas...')">Geo-Location</button>
        <button style="background: #333;" onclick="clearLog()">Limpar Console</button>
    </div>

    <div id="console">
        <div class="log-info">[INFO] S.I.D. V10 booting up...</div>
        <div class="log-info">[READY] System online.</div>
    </div>

    <script>
        const consoleEl = document.getElementById('console');

        function log(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = `log-${type}`;
            div.innerHTML = `[${type.toUpperCase()}] ${msg}`;
            consoleEl.appendChild(div);
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        function scan() {
            const target = document.getElementById('target').value;
            if(!target) return log('Target vazio!', 'error');
            
            log(`Hooking target: ${target}`, 'hook');
            setTimeout(() => {
                log('Injected scripts detected...', 'info');
                log('Analyzing source code...', 'info');
                log('Possible phishing/scam detected in CSS/JS.', 'error');
            }, 1000);
        }

        function clearLog() {
            consoleEl.innerHTML = '<div class="log-info">[CLEARED] System ready.</div>';
        }
    </script>
</body>
</html>
