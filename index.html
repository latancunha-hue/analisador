<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.I.D. ALPHA V10</title>
    <style>
        body { 
            background-color: #0a0a0a; color: #fff; font-family: sans-serif; 
            margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; 
        }
        
        /* Cabeçalho igual à imagem 1000160662.jpg */
        .header { 
            border: 1px solid #00ff00; width: 100%; max-width: 500px; 
            text-align: center; padding: 10px; margin-bottom: 15px; background: rgba(0,255,0,0.05);
        }
        .header h1 { color: #00ff00; font-size: 18px; margin: 0; letter-spacing: 1px; }

        input { 
            width: 100%; max-width: 500px; padding: 12px; background: #000; 
            border: 1px solid #00ff00; border-radius: 5px; color: #00ff00; 
            margin-bottom: 15px; box-sizing: border-box; outline: none;
        }

        /* Grade de botões coloridos igual ao seu modelo original */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 500px; }
        
        button { 
            padding: 15px; border: none; border-radius: 5px; color: black; 
            font-weight: bold; font-size: 11px; cursor: pointer; text-transform: uppercase;
        }

        .btn-scan { background: #00ff00; } /* VERDE */
        .btn-decoder { background: #ffcc00; } /* AMARELO */
        .btn-zap { background: #9933ff; color: white; } /* ROXO */
        .btn-deep { background: #00ff88; } /* CIANO */
        .btn-busca { background: #9933ff; color: white; } /* ROXO */
        .btn-telegram { background: #00ccff; } /* AZUL */
        .btn-clear { background: #333; color: white; grid-column: span 2; margin-top: 5px; }

        /* Console estilizado com auto-scroll */
        #console { 
            width: 100%; max-width: 500px; height: 320px; background: #000; 
            margin-top: 15px; border: 1px solid #00ff00; padding: 10px; 
            font-family: monospace; font-size: 11px; overflow-y: auto; color: #00ff00;
            box-sizing: border-box; white-space: pre-wrap;
        }
        .log-error { color: #ff3333; }
        .log-hook { color: #3399ff; }
    </style>
</head>
<body>

    <div class="header">
        <h1>S.I.D. ALPHA V10 [OSINT REAL-TIME]</h1>
        <small style="color: #666;">MODO: INVESTIGAÇÃO DE CAMPO ATIVO</small>
    </div>

    <input type="text" id="target" placeholder="INSIRA URL DO GOLPE OU IP...">

    <div class="grid">
        <button class="btn-scan" onclick="realScan()">SCAN RÁPIDO</button>
        <button class="btn-decoder" onclick="log('Módulo Decoder em manutenção', 'log-error')">DECODER VAZAMENTOS</button>
        <button class="btn-zap" onclick="realIpTrace()">IP TRACE REAL</button>
        <button class="btn-deep" onclick="log('Base de dados offline', 'log-error')">BUSCA PROFUNDA</button>
        <button class="btn-busca" onclick="log('Módulo de imagem requer API', 'log-hook')">BUSCA POR FOTO</button>
        <button class="btn-telegram" onclick="log('Conectando ao bot...', 'log-hook')">BOTS TELEGRAM</button>
        <button class="btn-clear" onclick="clearLog()">LIMPAR CONSOLE</button>
    </div>

    <div id="console">
        <div>[SYSTEM] S.I.D. ALPHA V10 ONLINE. AGUARDANDO COMANDO...</div>
    </div>

    <script>
        const consoleEl = document.getElementById('console');

        function log(msg, type = '') {
            const div = document.createElement('div');
            div.className = type;
            div.innerText = `> ${msg}`;
            consoleEl.appendChild(div);
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        // Função corrigida para puxar o código do site alvo
        async function realScan() {
            const val = document.getElementById('target').value;
            if(!val) return log('Erro: Digite a URL.', 'log-error');
            log(`Hooking target: ${val}`, 'log-hook');
            try {
                // Bypass CORS para ler o site real
                const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(val)}`);
                const d = await r.json();
                if(d.contents) {
                    log('CONEXÃO ESTABELECIDA. CÓDIGO CAPTURADO:');
                    log(d.contents.substring(0, 1500)); 
                    log('FIM DA CAPTURA.', 'log-hook');
                } else { log('O alvo bloqueou a conexão.', 'log-error'); }
            } catch (e) { log('Falha crítica no Deep Scan.', 'log-error'); }
        }

        // Função corrigida para IP Trace com dados reais
        async function realIpTrace() {
            const ip = document.getElementById('target').value;
            if(!ip) return log('Erro: Digite o IP no campo acima.', 'log-error');
            log(`Rastreando IP: ${ip}`, 'log-hook');
            try {
                const r = await fetch(`https://ipwho.is/${ip}`);
                const d = await r.json();
                if(d.success) {
                    log(`LOCAL: ${d.city}, ${d.region} - ${d.country}`);
                    log(`ISP/ORG: ${d.connection.isp}`);
                    log(`COORD: ${d.latitude}, ${d.longitude}`);
                } else { log('IP não encontrado.', 'log-error'); }
            } catch (e) { log('Erro no servidor de rastreio.', 'log-error'); }
        }

        function clearLog() { consoleEl.innerHTML = '<div>[TERMINAL LIMPO]</div>'; }
    </script>
</body>
</html>
