<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JR SYSTEMS v5.5 - FULL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #cbd5e1; margin: 0; overflow-x: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .neon-blue { box-shadow: 0 0 15px rgba(37, 99, 235, 0.3); }
        .console-text { font-family: 'Courier New', monospace; font-size: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        const config = window.__firebase_config ? JSON.parse(window.__firebase_config) : { apiKey: "", authDomain: "", projectId: "", storageBucket: "", messagingSenderId: "", appId: "" };
        const app = initializeApp(config);
        const db = getFirestore(app);
        const auth = getAuth(app);
        window.FB_CORE = { db, auth, appId: "jr-panel-pro-v5", collection, doc, setDoc, getDoc, onSnapshot, addDoc, serverTimestamp, signInAnonymously };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const Icon = ({ name, className }) => <i className={`fa-solid fa-${name} ${className}`}></i>;

        function App() {
            const [activeTab, setActiveTab] = useState('osint');
            const [target, setTarget] = useState('');
            const [consoleLogs, setConsoleLogs] = useState([]);
            const [blacklist, setBlacklist] = useState([]);
            const [systemLogs, setSystemLogs] = useState([]);
            const [agents, setAgents] = useState([]);
            
            // Puxar Dados
            const [searchNum, setSearchNum] = useState('');
            const [intelData, setIntelData] = useState(null);
            const [isSearching, setIsSearching] = useState(false);
            
            const [toast, setToast] = useState({ show: false, msg: '' });

            useEffect(() => {
                const init = async () => {
                    if (!window.FB_CORE) return setTimeout(init, 500);
                    const { auth, signInAnonymously, db, appId, onSnapshot, collection } = window.FB_CORE;
                    try {
                        await signInAnonymously(auth);
                        onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'blacklist'), (s) => 
                            setBlacklist(s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0)))
                        );
                        onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'logs'), (s) => 
                            setSystemLogs(s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0)).slice(0, 15))
                        );
                        onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'users'), (s) => 
                            setAgents(s.docs.map(d => ({id: d.id, ...d.data()})))
                        );
                    } catch (e) {}
                };
                init();
            }, []);

            const showToast = (msg) => {
                setToast({ show: true, msg });
                setTimeout(() => setToast({ show: false }), 3000);
            };

            const fetchIntel = async () => {
                if (!searchNum) return showToast("Insira o número!");
                setIsSearching(true);
                const apiKey = ""; 
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `Gere um dossiê OSINT detalhado para o número: ${searchNum}. JSON: nome_provavel, localizacao, operadora, nivel_risco(0-100), cpf_parcial, vazamentos_recentes(lista).` }] }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });
                    const result = await res.json();
                    setIntelData(JSON.parse(result.candidates[0].content.parts[0].text));
                    showToast("Dados Puxados com Sucesso!");
                } catch (e) { showToast("Erro na consulta IA"); }
                finally { setIsSearching(false); }
            };

            const executeBan = async (tipo) => {
                if (!target) return showToast("Número alvo vazio!");
                setConsoleLogs(p => [...p, `[SENTINEL] Iniciando injeção ${tipo}...`]);
                await new Promise(r => setTimeout(r, 800));
                setConsoleLogs(p => [...p, `[SENTINEL] Enviando 500 reports automáticos...`]);
                
                try {
                    const { db, appId, collection, addDoc, serverTimestamp } = window.FB_CORE;
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'blacklist'), {
                        number: target, motivo: tipo, autor: "JR ROOT", timestamp: serverTimestamp()
                    });
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'logs'), {
                        msg: `Ataque ${tipo} em ${target}`, type: 'attack', timestamp: serverTimestamp()
                    });
                    showToast("ALVO ADICIONADO À BLACKLIST!");
                } catch (e) {}
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="p-6 glass border-b border-white/5 sticky top-0 z-50 flex justify-between items-center">
                        <div className="flex items-center gap-4">
                            <div className="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center neon-blue">
                                <Icon name="shield-halved" className="text-white text-xl" />
                            </div>
                            <div>
                                <h1 className="font-black italic text-xl text-white tracking-tighter uppercase">JR <span className="text-blue-500">Systems v5.5</span></h1>
                                <p className="text-[9px] font-bold text-green-500 uppercase tracking-widest flex items-center gap-1">
                                    <span className="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span> Sistema Operacional
                                </p>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl w-full mx-auto p-4 md:p-8 flex-1">
                        <nav className="flex gap-2 overflow-x-auto no-scrollbar mb-8">
                            {[
                                { id: 'osint', label: 'Puxar Dados', icon: 'search' },
                                { id: 'ataque', label: 'Injeção Ban', icon: 'bolt' },
                                { id: 'lista', label: 'Blacklist', icon: 'user-slash' },
                                { id: 'logs', label: 'Logs', icon: 'microchip' },
                                { id: 'admin', label: 'Admin', icon: 'gears' }
                            ].map(t => (
                                <button key={t.id} onClick={() => setActiveTab(t.id)} className={`flex items-center gap-3 px-6 py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest transition-all ${activeTab === t.id ? 'bg-blue-600 text-white shadow-lg' : 'bg-slate-900/40 text-slate-500'}`}>
                                    <Icon name={t.icon} /> {t.label}
                                </button>
                            ))}
                        </nav>

                        {activeTab === 'osint' && (
                            <div className="max-w-3xl mx-auto space-y-6">
                                <div className="glass p-10 rounded-[2.5rem] shadow-2xl">
                                    <h3 className="text-center text-[11px] font-black text-blue-500 uppercase tracking-[0.4em] mb-8">Extração de Inteligência OSINT</h3>
                                    <div className="flex gap-3">
                                        <input value={searchNum} onChange={e => setSearchNum(e.target.value)} placeholder="Número (DDD + Número)" className="flex-1 bg-black/60 border border-slate-800 rounded-2xl p-5 text-white font-mono text-xl outline-none focus:border-blue-500" />
                                        <button onClick={fetchIntel} disabled={isSearching} className="bg-blue-600 hover:bg-blue-500 px-10 rounded-2xl text-white font-black uppercase text-xs transition-all">
                                            {isSearching ? <Icon name="spinner" className="animate-spin" /> : "PUXAR"}
                                        </button>
                                    </div>
                                </div>
                                {intelData && (
                                    <div className="glass p-8 rounded-[2.5rem] border-l-4 border-l-blue-500 animate-in zoom-in-95">
                                        <div className="flex justify-between items-start mb-6">
                                            <div>
                                                <p className="text-[10px] font-black text-blue-500 uppercase">Identidade Provável</p>
                                                <h2 className="text-2xl font-black text-white mt-1 uppercase italic">{intelData.nome_provavel}</h2>
                                            </div>
                                            <div className="text-right">
                                                <p className="text-[9px] font-black text-slate-500 uppercase">Risco</p>
                                                <p className="text-xl font-black text-red-500">{intelData.nivel_risco}%</p>
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4 text-xs">
                                            <div className="bg-black/40 p-4 rounded-xl">
                                                <p className="text-slate-500 font-black uppercase mb-1">Localização</p>
                                                <p className="text-slate-200 font-bold uppercase">{intelData.localizacao}</p>
                                            </div>
                                            <div className="bg-black/40 p-4 rounded-xl">
                                                <p className="text-slate-500 font-black uppercase mb-1">CPF Parcial</p>
                                                <p className="text-slate-200 font-mono font-bold uppercase">{intelData.cpf_parcial || "N/A"}</p>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab === 'ataque' && (
                            <div className="max-w-2xl mx-auto space-y-6">
                                <div className="glass p-10 rounded-[3rem]">
                                    <h3 className="text-center text-[10px] font-black text-red-500 uppercase tracking-widest mb-10">Módulo de Injeção de Relatórios</h3>
                                    <input value={target} onChange={e => setTarget(e.target.value)} placeholder="Número Alvo" className="w-full bg-black/50 border border-slate-800 rounded-2xl p-6 text-red-500 font-mono text-2xl text-center outline-none focus:border-red-500 mb-8" />
                                    <div className="grid grid-cols-2 gap-4">
                                        <button onClick={() => executeBan("C. INFANTIL")} className="bg-red-600/10 border border-red-500/20 p-8 rounded-3xl hover:bg-red-600 group transition-all text-center">
                                            <Icon name="skull" className="text-red-500 group-hover:text-white text-2xl mb-2" /><br/>
                                            <span className="text-[10px] font-black text-white uppercase">C. Infantil</span>
                                        </button>
                                        <button onClick={() => executeBan("FRAUDE")} className="bg-blue-600/10 border border-blue-500/20 p-8 rounded-3xl hover:bg-blue-600 group transition-all text-center">
                                            <Icon name="user-ninja" className="text-blue-500 group-hover:text-white text-2xl mb-2" /><br/>
                                            <span className="text-[10px] font-black text-white uppercase">Spam/Fraude</span>
                                        </button>
                                    </div>
                                </div>
                                <div className="bg-black p-6 rounded-3xl h-40 overflow-y-auto console-text text-green-500 border border-white/5">
                                    {consoleLogs.map((l, i) => <div key={i}>{l}</div>)}
                                </div>
                            </div>
                        )}

                        {activeTab === 'lista' && (
                            <div className="glass rounded-[2rem] overflow-hidden">
                                <table className="w-full text-left text-xs">
                                    <thead className="bg-black/40 text-slate-500 uppercase font-black text-[10px] tracking-widest">
                                        <tr><th className="p-6">Alvo</th><th className="p-6">Motivo</th><th className="p-6 text-right">Data</th></tr>
                                    </thead>
                                    <tbody className="divide-y divide-white/5">
                                        {blacklist.map(b => (
                                            <tr key={b.id} className="hover:bg-white/5">
                                                <td className="p-6 font-mono text-blue-500 font-bold">{b.number}</td>
                                                <td className="p-6"><span className="bg-red-500/10 text-red-500 px-3 py-1 rounded-lg font-black uppercase text-[9px]">{b.motivo}</span></td>
                                                <td className="p-6 text-right text-slate-600 font-mono">{b.timestamp?.seconds ? new Date(b.timestamp.seconds * 1000).toLocaleDateString() : 'Agora'}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}

                        {activeTab === 'logs' && (
                            <div className="max-w-2xl mx-auto space-y-2">
                                {systemLogs.map(l => (
                                    <div key={l.id} className="glass p-4 rounded-xl flex justify-between items-center text-[10px] border-l-2 border-blue-600">
                                        <p className="font-bold text-slate-300 uppercase">{l.msg}</p>
                                        <p className="text-slate-600 font-mono">{l.timestamp?.seconds ? new Date(l.timestamp.seconds * 1000).toLocaleTimeString() : '...'}</p>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'admin' && (
                            <div className="glass rounded-[2rem] overflow-hidden">
                                <div className="p-6 bg-blue-600/10 border-b border-blue-500/20 font-black text-blue-500 uppercase tracking-widest text-xs">Acessos Registados</div>
                                <table className="w-full text-left text-xs">
                                    <thead className="bg-black/40 text-slate-500 uppercase font-bold text-[10px]">
                                        <tr><th className="p-6">Usuário</th><th className="p-6">Senha</th><th className="p-6 text-right">Login</th></tr>
                                    </thead>
                                    <tbody className="divide-y divide-white/5">
                                        {agents.map(a => (
                                            <tr key={a.id} className="hover:bg-white/5">
                                                <td className="p-6 font-black uppercase text-slate-200">{a.username}</td>
                                                <td className="p-6 text-blue-500 font-mono">{a.password}</td>
                                                <td className="p-6 text-right text-slate-600">{a.lastLogin?.seconds ? new Date(a.lastLogin.seconds * 1000).toLocaleString() : 'N/A'}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </main>

                    {toast.show && (
                        <div className="fixed bottom-10 left-1/2 -translate-x-1/2 bg-blue-600 text-white px-10 py-4 rounded-full font-black text-[10px] uppercase shadow-2xl z-[100] animate-bounce">
                            {toast.msg}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
