<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel JR v5.2 - Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #cbd5e1; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Ícones simples via FontAwesome para substituir o Lucide no HTML direto
        const Icon = ({ name, className }) => <i className={`fa-solid fa-${name} ${className}`}></i>;

        function App() {
            // Configuração Firebase (Vazia por padrão, preencher se necessário)
            const [isLogged, setIsLogged] = useState(false);
            const [userName, setUserName] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const [activeTab, setActiveTab] = useState('metodo-api');
            const [target, setTarget] = useState('');
            const [consoleLogs, setConsoleLogs] = useState([]);
            const [toast, setToast] = useState({ show: false, msg: '' });

            const modelosDenuncia = [
                { label: "C. Infantil", text: "Solicito banimento imediato deste número por conteúdo infantil ilegal. Violação grave." },
                { label: "Fraude/Spam", text: "Este número está realizando ataques de phishing e spam em massa. Solicito suspensão." },
                { label: "Ameaça/Ódio", text: "Número identificado em conduta de ódio e ameaças reais à integridade física." }
            ];

            const handleLogin = (e) => {
                if (e) e.preventDefault();
                if (!userName || !password) return showToast("Preencha os campos!");
                setLoading(true);
                
                // Lógica de Login Simples para o GitHub Pages
                setTimeout(() => {
                    if (userName.toUpperCase() === 'JR' && password !== '123') {
                        showToast("Senha Inválida!");
                    } else {
                        setIsLogged(true);
                        showToast("BEM-VINDO, " + userName.toUpperCase());
                    }
                    setLoading(false);
                }, 1000);
            };

            const executeBan = async (motivo) => {
                if (!target) return showToast("Informe o Alvo!");
                setConsoleLogs([]);
                const sequence = [
                    "A iniciar Protocolo JR v5.2...",
                    "A interceptar pacotes API...",
                    `Payload: ${motivo}`,
                    "A enviar 150 relatórios automáticos...",
                    "Sucesso! Alvo processado."
                ];

                for (const text of sequence) {
                    setConsoleLogs(prev => [...prev, `[SYS] ${text}`]);
                    await new Promise(r => setTimeout(r, 500));
                }
                showToast("ATAQUE FINALIZADO!");
            };

            const copyText = (text) => {
                setConsoleLogs(prev => [...prev, `[INFO] Texto preparado: ${text.substring(0, 20)}...`]);
                showToast("Texto pronto!");
            };

            const showToast = (msg) => {
                setToast({ show: true, msg });
                setTimeout(() => setToast({ show: false, msg: '' }), 3000);
            };

            if (!isLogged) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6">
                        <div className="w-full max-w-md bg-slate-900 border border-white/10 p-10 rounded-[2.5rem] shadow-2xl relative">
                            <div className="absolute top-0 left-0 w-full h-1 bg-blue-600"></div>
                            <div className="flex flex-col items-center mb-10">
                                <div className="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mb-4">
                                    <Icon name="skull" className="text-white text-2xl" />
                                </div>
                                <h1 className="text-xl font-black uppercase italic tracking-widest text-white">Painel JR <span className="text-blue-500">v5.2</span></h1>
                            </div>
                            <form onSubmit={handleLogin} className="space-y-4">
                                <input value={userName} onChange={e => setUserName(e.target.value)} placeholder="Agente" className="w-full bg-black/40 border border-slate-800 rounded-xl py-4 px-4 text-white outline-none focus:border-blue-500" />
                                <input type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="Senha" className="w-full bg-black/40 border border-slate-800 rounded-xl py-4 px-4 text-white outline-none focus:border-blue-500" />
                                <button type="submit" className="w-full bg-blue-600 text-white font-bold py-4 rounded-xl uppercase text-xs tracking-widest mt-2">
                                    {loading ? "A carregar..." : "Entrar"}
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen">
                    <header className="p-4 bg-slate-900/80 border-b border-white/5 sticky top-0 backdrop-blur-md">
                        <div className="max-w-4xl mx-auto flex justify-between items-center">
                            <h1 className="font-black italic text-white uppercase tracking-tighter">JR <span className="text-blue-500 text-sm">PREMIUM</span></h1>
                            <span className="text-[10px] font-bold text-blue-400 bg-blue-400/10 px-3 py-1 rounded-full uppercase">{userName}</span>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto p-6">
                        <div className="bg-slate-900/40 border border-white/5 p-8 rounded-[2rem] shadow-xl">
                            <div className="space-y-6">
                                <div>
                                    <label className="text-[10px] font-bold text-slate-500 uppercase ml-2">ID do Alvo</label>
                                    <input value={target} onChange={e => setTarget(e.target.value)} placeholder="55..." className="w-full bg-black/50 border border-slate-800 rounded-2xl p-5 text-blue-500 font-mono text-xl outline-none focus:border-blue-500 mt-1" />
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    <button onClick={() => executeBan("C. INFANTIL")} className="bg-red-600/10 border border-red-500/20 p-6 rounded-2xl hover:bg-red-600 group transition-all">
                                        <Icon name="shield-heart" className="text-red-500 group-hover:text-white mb-2" />
                                        <p className="text-xs font-bold text-white uppercase">C. Infantil</p>
                                    </button>
                                    <button onClick={() => executeBan("SPAM/FRAUDE")} className="bg-blue-600/10 border border-blue-500/20 p-6 rounded-2xl hover:bg-blue-600 group transition-all">
                                        <Icon name="bolt" className="text-blue-500 group-hover:text-white mb-2" />
                                        <p className="text-xs font-bold text-white uppercase">Spam/Fraude</p>
                                    </button>
                                </div>

                                <div className="pt-4 border-t border-white/5">
                                    <p className="text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-3">Modelos de Suporte</p>
                                    <div className="flex flex-wrap gap-2">
                                        {modelosDenuncia.map((m, i) => (
                                            <button key={i} onClick={() => copyText(m.text)} className="bg-slate-800 px-4 py-2 rounded-lg text-[10px] font-bold text-slate-300 hover:bg-slate-700">
                                                <Icon name="copy" className="mr-2" /> {m.label}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>

                        {consoleLogs.length > 0 && (
                            <div className="mt-6 bg-black border border-slate-800 p-4 rounded-2xl font-mono text-[10px] text-green-500 h-32 overflow-y-auto">
                                {consoleLogs.map((l, i) => <div key={i}>{l}</div>)}
                            </div>
                        )}
                    </main>

                    {toast.show && (
                        <div className="fixed bottom-10 left-1/2 -translate-x-1/2 bg-blue-600 text-white px-8 py-3 rounded-full text-[10px] font-black uppercase tracking-widest shadow-2xl">
                            {toast.msg}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
